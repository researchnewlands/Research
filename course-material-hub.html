<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Material | Research Masterclass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { clinical: { 600: '#d32f2f' } } } }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <nav class="bg-white p-6 shadow-sm flex items-center justify-between">
        <div class="font-bold text-xl">Newlands Clinic</div>
        <div class="hidden lg:flex items-center space-x-8">
            <a href="index.html" class="text-xs uppercase tracking-wider font-semibold text-slate-600 hover:text-clinical-600 transition">Home</a>
            <a href="course-material-hub.html" class="text-xs uppercase tracking-wider font-semibold text-clinical-600 transition">Course Material</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto py-12 px-6">
        
        <h1 class="text-3xl font-bold mb-8 text-slate-900">Course Curriculum</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <button onclick="checkPasskey('topic-1-notes.html')" class="p-6 bg-white border border-slate-200 rounded-lg hover:border-clinical-600 transition shadow-sm font-semibold text-left">Topic 1: Fundamentals</button>
            <button onclick="checkPasskey('topic-2-notes.html')" class="p-6 bg-white border border-slate-200 rounded-lg hover:border-clinical-600 transition shadow-sm font-semibold text-left">Topic 2</button>
            <button onclick="checkPasskey('topic-3-notes.html')" class="p-6 bg-white border border-slate-200 rounded-lg hover:border-clinical-600 transition shadow-sm font-semibold text-left">Topic 3</button>
            <button onclick="checkPasskey('topic-4-notes.html')" class="p-6 bg-white border border-slate-200 rounded-lg hover:border-clinical-600 transition shadow-sm font-semibold text-left">Topic 4</button>
            <button onclick="checkPasskey('topic-5-notes.html')" class="p-6 bg-white border border-slate-200 rounded-lg hover:border-clinical-600 transition shadow-sm font-semibold text-left">Topic 5</button>
            
            <button onclick="checkPasskey('grading-quiz.html')" class="p-6 bg-white border-2 border-clinical-600 rounded-lg hover:bg-red-50 transition shadow-md font-bold text-clinical-700 flex items-center justify-center">
                WEEKLY GRADING QUIZ
            </button>
        </div>
    </main>

    <script>
        const PASSKEY = "Research2026"; 

        function checkPasskey(targetPage) {
            const userInput = prompt("Please enter the passkey to access this material:");
            
            if (userInput === PASSKEY) {
                window.location.href = targetPage;
            } else if (userInput !== null) {
                alert("Incorrect passkey. Access denied.");
            }
        }
    </script>
</body>
</html>
